name: Upload Python Package

on:
  push: 
    branches: [main]
  pull_request:
    branches: [main]

jobs:
   matrix-pip:
    name: name and train the model
    runs-on: ubuntu-latest
    startegy:
      matrix:
      python: [3.11,3.12]

  steps:
    -name: Checkout
     uses: action/checkout@v4

   -name: Setup Python
    uses: action/setup-python@v4
    with:
     python-version: ${{ matrix.python }}

   -name: Upgrade pip
    run: pyhton -m pip install --upgrade pip
  -name: install project dependenices 
    run: python -m pip install  -r requirements.txt

  -name: train the model
    run: python train.python
         ls -la artifacts
         
  -name: upload artifacts
   uses:  action/upload-artifacts
  
